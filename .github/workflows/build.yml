name: CI

on:
  push:
    branches: [ master ]

  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  build:
    runs-on: macos-26
    outputs:
      build_number: ${{ steps.build_app.outputs.build_number }}
      app_version: ${{ steps.build_app.outputs.app_version }}

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Set active Xcode path
        run: |
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          REQUESTED_XCODE_PATH="/Applications/Xcode_$XCODE_VERSION.app/Contents/Developer"
          if [ -d "$REQUESTED_XCODE_PATH" ]; then
            sudo xcode-select -s "$REQUESTED_XCODE_PATH"
          else
            echo "Requested Xcode path not found: $REQUESTED_XCODE_PATH"
            echo "Using runner default Xcode:"
            xcode-select -p
            xcodebuild -version
            echo "Available Xcode installations:"
            ls -1 /Applications | grep "^Xcode" || true
          fi

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Build the App
        id: build_app
        run: |
          set -x

          # source code paths are included in the final binary, so we need to make them stable across builds
          SOURCE_DIR=/Users/Shared/telegram-ios

          # use canonical bazel root
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"

          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"

          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$(echo $BUILD_NUMBER)" >> $GITHUB_ENV
          echo "APP_VERSION=$(echo $APP_VERSION)" >> $GITHUB_ENV
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"

          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs
          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER" \
            --outputBuildArtifactsPath="build/artifacts"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ayugram-ios-build
          path: |
            /Users/Shared/telegram-ios/build/artifacts/Telegram.ipa
            /Users/Shared/telegram-ios/build/artifacts/Telegram.DSYMs.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ayugram-ios-build
          path: build/artifacts

      - name: Publish Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: build-${{ needs.build.outputs.build_number }}
          RELEASE_NAME: AyuGram ${{ needs.build.outputs.app_version }} (${{ needs.build.outputs.build_number }})
          RELEASE_BODY: An unsigned sideload build of AyuGram for iOS ${{ needs.build.outputs.app_version }} (${{ needs.build.outputs.build_number }})
        run: |
          set -euo pipefail

          cp build/artifacts/Telegram.ipa build/artifacts/AyuGram.ipa
          cp build/artifacts/Telegram.DSYMs.zip build/artifacts/AyuGram.DSYMs.zip

          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --repo "$GH_REPO" \
              --title "$RELEASE_NAME" \
              --notes "$RELEASE_BODY"
          else
            gh release create "$TAG_NAME" \
              --repo "$GH_REPO" \
              --title "$RELEASE_NAME" \
              --notes "$RELEASE_BODY"
          fi

          gh release upload "$TAG_NAME" \
            --repo "$GH_REPO" \
            build/artifacts/AyuGram.ipa \
            build/artifacts/AyuGram.DSYMs.zip \
            --clobber
